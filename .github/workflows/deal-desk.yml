name: Update Deal Desk

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      # Documentation is not part of the runtime or Pages artifact. Keep the
      # deterministic validation path for code/config/data/workflow changes.
      - "docs/**"
      - "AGENTS.md"
      - "README.md"
      - "SECURITY.md"
      - "LICENSE"
      # Bot-generated public artifacts must not trigger their own refresh loop.
      - "output/**"
      - "site/**"
      - "data/precedent_transactions.json"
  workflow_dispatch:
  schedule:
    # Target cadence only: GitHub may delay scheduled starts; this is not a real-time SLA.
    - cron: "*/30 * * * *"

permissions: {}

concurrency:
  group: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'deal-desk-pages' || format('deal-desk-validation-{0}', github.run_id) }}
  # A valid production refresh is never cancelled by the next 30-minute slot.
  # Validation runs use unique groups and cannot cancel a production refresh.
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ci.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Verify checked-in artifact contracts
        run: python scripts/release_diagnostics.py verify-public-artifacts

  production_refresh:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: read
    outputs:
      publish_delta: ${{ steps.refresh.outputs.publish_delta }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pinned production dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ci.txt

      - name: Restore cross-run orchestration state
        id: orchestration-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/deal-markets-orchestration
          key: deal-markets-orchestration-v1-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            deal-markets-orchestration-v1-

      - name: Initialize orchestration state directory
        run: mkdir -p "$RUNNER_TEMP/deal-markets-orchestration"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Set one UTC orchestration clock
        run: echo "ORCHESTRATION_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Fetch eligible current deal flow
        id: refresh
        env:
          DEAL_MARKETS_ORCHESTRATION_STATE: ${{ runner.temp }}/deal-markets-orchestration/state.json
        run: python run.py --live --orchestration-at "$ORCHESTRATION_AT"

      - name: Save cross-run orchestration state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/deal-markets-orchestration
          key: deal-markets-orchestration-v1-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Persist replay canonicalization before Excel
        if: steps.refresh.outputs.publish_delta == 'true'
        run: python run.py --replay

      - name: Rebuild Excel workbook
        if: steps.refresh.outputs.publish_delta == 'true'
        run: python scripts/build_precedents_workbook_ci.py

      - name: Synchronize dashboard health with Excel
        if: steps.refresh.outputs.publish_delta == 'true'
        run: python run.py --replay

      - name: Verify synchronized public artifacts
        run: |
          python scripts/release_diagnostics.py verify-public-artifacts
          python -m unittest discover -s tests -v

      - name: Prepare site
        if: steps.refresh.outputs.publish_delta == 'true'
        run: |
          mkdir -p site
          cp output/deal_markets_brief.html site/index.html
          cp output/precedent_transactions.csv site/precedent_transactions.csv
          test -s output/precedent_transactions.xlsx
          cp output/precedent_transactions.xlsx site/precedent_transactions.xlsx
          cp output/build_manifest.json site/build_manifest.json
          touch site/.nojekyll

      - name: Verify origin main still matches the run parent
        run: python scripts/release_diagnostics.py verify-parent --expected-base "$GITHUB_SHA"

      - name: Commit and push verified publishable delta
        if: steps.refresh.outputs.publish_delta == 'true'
        run: |
          git config user.name "deal-desk-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/deal_markets_brief.html output/latest_snapshot.json output/precedent_transactions.csv output/precedent_transactions.xlsx output/build_manifest.json data/precedent_transactions.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh deal desk"
          fi
          python scripts/release_diagnostics.py bot-push --expected-base "$GITHUB_SHA"

      - name: Configure Pages
        if: steps.refresh.outputs.publish_delta == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.refresh.outputs.publish_delta == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: needs.production_refresh.result == 'success' && needs.production_refresh.outputs.publish_delta == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment_retry.outputs.page_url || steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: production_refresh
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retrying a transient Pages failure
        if: steps.deployment.outcome == 'failure'
        run: sleep 15

      - name: Retry GitHub Pages deployment
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
