name: Update Deal Desk

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      # Documentation is not part of the runtime or Pages artifact. Keep the
      # deterministic validation path for code/config/data/workflow changes.
      - "docs/**"
      - "AGENTS.md"
      - "README.md"
      - "SECURITY.md"
      - "LICENSE"
      # Bot-generated public artifacts must not trigger their own refresh loop.
      - "output/**"
      - "site/**"
      - "data/precedent_transactions.json"
  workflow_dispatch:
  schedule:
    # Moscow 08:30, then every 30 minutes through 18:30 (UTC+3).
    - cron: "30 5 * * 1-5"
    - cron: "0,30 6-14 * * 1-5"
    - cron: "0,30 15 * * 1-5"

permissions: {}

concurrency:
  group: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'deal-desk-pages' || format('deal-desk-validation-{0}', github.run_id) }}
  # A newer scheduled/manual refresh supersedes an older production writer.
  # Validation runs use unique groups and cannot cancel a production refresh.
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ci.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Verify checked-in artifact contracts
        run: python scripts/verify_public_artifacts.py

  production_refresh:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Fetch current deal flow
        run: python run.py --live

      - name: Install public XLSX builder
        run: python -m pip install --disable-pip-version-check -r requirements-ci.txt

      - name: Persist replay canonicalization before Excel
        run: python run.py --replay

      - name: Rebuild Excel workbook
        run: python scripts/build_precedents_workbook_ci.py

      - name: Synchronize dashboard health with Excel
        run: python run.py --replay

      - name: Verify synchronized public artifacts
        run: |
          python -m unittest discover -s tests -v
          python scripts/verify_public_artifacts.py

      - name: Prepare site
        run: |
          mkdir -p site
          cp output/deal_markets_brief.html site/index.html
          cp output/precedent_transactions.csv site/precedent_transactions.csv
          test -s output/precedent_transactions.xlsx
          cp output/precedent_transactions.xlsx site/precedent_transactions.xlsx
          cp output/build_manifest.json site/build_manifest.json
          touch site/.nojekyll

      - name: Persist change-detection baseline
        run: |
          git config user.name "deal-desk-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/deal_markets_brief.html output/latest_snapshot.json output/precedent_transactions.csv output/precedent_transactions.xlsx output/build_manifest.json data/precedent_transactions.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh deal desk"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment_retry.outputs.page_url || steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: production_refresh
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retrying a transient Pages failure
        if: steps.deployment.outcome == 'failure'
        run: sleep 15

      - name: Retry GitHub Pages deployment
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
